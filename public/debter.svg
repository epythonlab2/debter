<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient Matching Slate-900/Slate-950/Black -->
    <linearGradient id="ledgerBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#020617" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <!-- Gold Drop Shadow Effects -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ledger Cover Main Body -->
  <rect x="64" y="32" width="384" height="448" rx="48" fill="url(#ledgerBg)" stroke="#1e293b" stroke-width="4" filter="url(#shadow)" />

  <!-- Left Spine Spine Rings (Wire Bindings) -->
  <g fill="#ca973e">
    <rect x="44" y="80" width="40" height="16" rx="8" fill="#ca973e" />
    <rect x="44" y="144" width="40" height="16" rx="8" fill="#ca973e" />
    <rect x="44" y="208" width="40" height="16" rx="8" fill="#ca973e" />
    <rect x="44" y="272" width="40" height="16" rx="8" fill="#ca973e" />
    <rect x="44" y="336" width="40" height="16" rx="8" fill="#ca973e" />
    <rect x="44" y="400" width="40" height="16" rx="8" fill="#ca973e" />
  </g>

  <!-- Right Spine Elastic Closure Band -->
  <rect x="400" y="32" width="24" height="448" fill="#020617" opacity="0.8" />
  <line x1="400" y1="32" x2="400" y2="480" stroke="#000000" stroke-width="2" />

  <!-- Amharic "ደብተር" Brand Typography (Golden Core text) -->
  <text x="246" y="260" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="84px" 
        font-weight="900" 
        fill="#eec06b" 
        text-anchor="middle" 
        letter-spacing="-2">ደብተር</text>

  <!-- Blue Accent Rule Line (#1a5fb4) -->
  <rect x="196" y="290" width="100" height="8" rx="4" fill="#1a5fb4" />

  <!-- Bottom Hanging Bookmark Ribbon (#1a5fb4) -->
  <path d="M 330 440 L 390 440 L 390 500 L 360 475 L 330 500 Z" fill="#1a5fb4" filter="url(#shadow)" />
</svg>
